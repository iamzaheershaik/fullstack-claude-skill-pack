version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: bakeroute_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: bakeroute_dev
      POSTGRES_PASSWORD: postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: bakeroute_redis
    ports:
      - "6379:6379"

  mongo:
    image: mongo:7
    container_name: bakeroute_mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: bakeroute_tracking
    volumes:
      - mongo_data:/data/db

volumes:
  postgres_data:
  mongo_data:
